name: Daily Sanitize

on:
  schedule:
    # Run daily at 06:00 UTC (gives time for overnight compromise detection)
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      quarantine_days:
        description: 'Commit quarantine window (days)'
        required: false
        default: '7'
      dep_quarantine_days:
        description: 'npm dependency quarantine window (days)'
        required: false
        default: '7'
      verify_only:
        description: 'Run sanitize + verify but skip branch push and PR (for fix branch testing)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pull-requests: write

env:
  SANITIZE_BRANCH: sanitize/latest

jobs:
  sanitize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gstuck
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Clone upstream gstack
        run: git clone --quiet https://github.com/garrytan/gstack.git /tmp/gstack-upstream

      - name: Resolve quarantine-safe SHA
        id: resolve
        run: |
          DAYS="${{ inputs.quarantine_days || '7' }}"
          SHA=$(bash scripts/sanitize.sh --resolve-sha /tmp/gstack-upstream --quarantine-days "$DAYS" 2>/dev/null | head -1)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

          # In verify_only mode, always run (we're testing updated scripts against the same SHA)
          if [ "${{ inputs.verify_only }}" = "true" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "verify_only mode — forcing run with SHA $SHA"
          else
            # Check against what's on main (not the PR branch)
            CURRENT_SHA=$(cat upstream.sha 2>/dev/null | tr -d '[:space:]' || echo "")
            if [ "$SHA" = "$CURRENT_SHA" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "SHA unchanged ($SHA) — nothing to do"
            else
              echo "changed=true" >> "$GITHUB_OUTPUT"
              echo "New SHA: $SHA (was: $CURRENT_SHA)"
            fi
          fi

      - name: Skip if unchanged
        if: steps.resolve.outputs.changed == 'false'
        run: echo "Upstream SHA unchanged — skipping sanitization"

      - name: Run sanitize
        if: steps.resolve.outputs.changed == 'true'
        run: |
          DAYS="${{ inputs.quarantine_days || '7' }}"
          echo "${{ steps.resolve.outputs.sha }}" > upstream.sha
          bash scripts/sanitize.sh --local /tmp/gstack-upstream --quarantine-days "$DAYS"

      - name: Pin dependencies
        if: steps.resolve.outputs.changed == 'true'
        run: |
          DAYS="${{ inputs.dep_quarantine_days || '7' }}"
          bash scripts/pin-deps.sh --quarantine-days "$DAYS"

      - name: Build
        if: steps.resolve.outputs.changed == 'true'
        run: |
          cd output/gstack
          bun install --frozen-lockfile
          bun run build

      - name: Post-build fixup
        if: steps.resolve.outputs.changed == 'true'
        run: cd output/gstack && node ../../scripts/post-build-fixup.mjs

      - name: Static verification
        if: steps.resolve.outputs.changed == 'true'
        run: bash scripts/verify.sh

      - name: Get upstream version + commit info
        if: steps.resolve.outputs.changed == 'true'
        id: info
        run: |
          VERSION=$(cat output/gstack/VERSION 2>/dev/null | tr -d '[:space:]' || echo "unknown")
          SHORT_SHA=$(echo "${{ steps.resolve.outputs.sha }}" | head -c 8)
          COMMIT_DATE=$(cd /tmp/gstack-upstream && git show -s --format='%ci' "${{ steps.resolve.outputs.sha }}" | cut -d' ' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "commit_date=$COMMIT_DATE" >> "$GITHUB_OUTPUT"

      - name: Verify-only summary
        if: steps.resolve.outputs.changed == 'true' && inputs.verify_only == true
        run: |
          echo "## ✅ Verify-only run PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "Sanitize scripts on this branch produce a clean build." >> "$GITHUB_STEP_SUMMARY"
          echo "- **Upstream SHA:** ${{ steps.resolve.outputs.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $(cat output/gstack/VERSION 2>/dev/null || echo unknown)" >> "$GITHUB_STEP_SUMMARY"

      - name: Push to sanitize branch (reuse if PR is open)
        if: steps.resolve.outputs.changed == 'true' && inputs.verify_only != true
        run: |
          git config user.name "gstuck-bot"
          git config user.email "gstuck-bot@users.noreply.github.com"

          # Switch to the sanitize branch, creating it from main if it doesn't exist
          if git ls-remote --exit-code origin "$SANITIZE_BRANCH" >/dev/null 2>&1; then
            git checkout -B "$SANITIZE_BRANCH" origin/main
          else
            git checkout -b "$SANITIZE_BRANCH"
          fi

          git add upstream.sha output/
          git commit -m "chore: sanitize upstream gstack v${{ steps.info.outputs.version }} (${{ steps.info.outputs.short_sha }})"
          git push --force-with-lease origin "$SANITIZE_BRANCH"

      - name: Create or update Pull Request
        if: steps.resolve.outputs.changed == 'true' && inputs.verify_only != true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          EXISTING_PR=$(gh pr list --head "$SANITIZE_BRANCH" --state open --json number --jq '.[0].number' || true)

          BODY="$(cat <<EOF
          ## Upstream update

          - **Upstream SHA:** \`${{ steps.resolve.outputs.sha }}\`
          - **Upstream version:** v${{ steps.info.outputs.version }}
          - **Commit date:** ${{ steps.info.outputs.commit_date }}
          - **Commit quarantine:** ${{ inputs.quarantine_days || '7' }} days
          - **npm quarantine:** ${{ inputs.dep_quarantine_days || '7' }} days

          ## Automated checks passed

          - [x] \`sanitize.sh\` — all telemetry/phone-home patterns removed
          - [x] \`pin-deps.sh\` — dependencies locked by SHA-512 integrity hash
          - [x] \`bun run build\` — SKILL.md regeneration + browse binary compiled
          - [x] \`verify.sh\` — static verification gate passed

          ## Before merging

          Run the **AI security review** using Claude Code:

          \`\`\`
          /review-sanitize
          \`\`\`

          This reviews the diff for new external URLs, network calls, data collection,
          or re-added telemetry that the static checks can't catch.

          See CLAUDE.md for the full protocol.
          EOF
          )"

          TITLE="Sanitize: gstack v${{ steps.info.outputs.version }} (${{ steps.info.outputs.short_sha }})"

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #${EXISTING_PR}"
            gh pr edit "$EXISTING_PR" --title "$TITLE" --body "$BODY"
            gh pr comment "$EXISTING_PR" --body "Updated to upstream \`${{ steps.resolve.outputs.sha }}\` (v${{ steps.info.outputs.version }}, ${{ steps.info.outputs.commit_date }}). All automated checks passed."
          else
            echo "Creating new PR"
            gh pr create \
              --title "$TITLE" \
              --body "$BODY" \
              --head "$SANITIZE_BRANCH" \
              --base main
          fi
